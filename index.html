<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Theatre Stage</title>
        <link rel="stylesheet" href="style.css" />
    </head>

    <body>
        <div id="top-bar">
            <div class="brand-group">
                <div class="brand">Stage Planner</div>
                <div class="project-title" id="project-title">Untitled Project</div>
            </div>
            <div class="top-tag">MVP editor</div>
            <div class="top-actions">
                <button id="save-btn">Save</button>
                <button id="load-btn">Load</button>
                <button id="clear-btn">Clear Stage</button>
                <span class="top-actions-sep"></span>
                <button id="topdown-btn">Top Down</button>
                <button id="export-btn">Export PNG</button>
            </div>
        </div>

        <!-- This is where the 3D Scene will render -->
        <canvas id="theatre-canvas"></canvas>


        <!-- Add Button - bottom centre -->
        <button id="add-btn">+ Add</button>

        <!-- View Toolbar - bottom left: grid + snap controls -->
        <div id="view-toolbar">
            <button id="grid-btn" title="Toggle grid overlay">Grid</button>
            <button id="snap-btn" title="Snap props to grid while dragging">Snap</button>
            <select id="snap-select" title="Grid step size">
                <option value="0.1">0.1 m</option>
                <option value="0.25">0.25 m</option>
                <option value="0.5" selected>0.5 m</option>
                <option value="1">1.0 m</option>
            </select>
        </div>

        <!-- Reset View Button - bottom right -->
        <button id="reset-view-btn" title="Reset View">↺ Reset View</button>

        <!-- Add panel - slides up when Add is clicked -->
        <div id="add-panel">
            <!-- Close Button - Top Right -->
            <button id="close-panel">X</button>
            <h3>Add To Stage</h3>
            <div id="add-panel-items"></div>
        </div>

        <input type="file" id="load-input" accept=".theatre.json,application/json" hidden />

        <!-- Modal dialog -->
        <div id="modal-overlay" class="hidden">
            <div class="modal">
                <p id="modal-message"></p>
                <input type="text" id="modal-input" class="hidden" autocomplete="off" />
                <div class="modal-actions">
                    <button id="modal-cancel"  class="modal-btn modal-btn-secondary">Cancel</button>
                    <button id="modal-confirm" class="modal-btn modal-btn-primary">OK</button>
                </div>
            </div>
        </div>

        <!-- Right Side Panel - Properties and Layers -->
        <div id="right-panel">
            <button id="panel-tab" title="Toggle panel"><span class="tab-icon">‹</span></button>

            <!-- Properties Section -->
            <div class="panel-section" id="properties-section">
                <div class="panel-header">
                    <span class="panel-title">Properties</span>
                    <button class="panel-toggle" data-section="properties">›</button>
                </div>
                <div class="panel-content">
                    <div id="properties-empty">Select a prop to edit its properties.</div>
                    <div id="properties-fields" class="hidden">
                        <div class="field">
                            <label for="prop-name">Name</label>
                            <input type="text" id="prop-name" />
                        </div>
                        <div class="field-group">
                            <div class="field">
                                <label for="prop-pos-x">Position X</label>
                                <input type="number" step="0.1" id="prop-pos-x" />
                            </div>
                            <div class="field">
                                <label for="prop-pos-y">Position Y</label>
                                <input type="number" step="0.1" id="prop-pos-y" />
                            </div>
                            <div class="field">
                                <label for="prop-pos-z">Position Z</label>
                                <input type="number" step="0.1" id="prop-pos-z" />
                            </div>
                        </div>
                        <div class="field-group">
                            <div class="field">
                                <label for="prop-size-w">Width</label>
                                <input type="number" step="0.1" id="prop-size-w" />
                            </div>
                            <div class="field">
                                <label for="prop-size-h">Height</label>
                                <input type="number" step="0.1" id="prop-size-h" />
                            </div>
                            <div class="field">
                                <label for="prop-size-d">Depth</label>
                                <input type="number" step="0.1" id="prop-size-d" />
                            </div>
                        </div>
                        <div class="field-group">
                            <div class="field">
                                <label for="prop-rot-x">Rotation X</label>
                                <input type="number" step="1" id="prop-rot-x" />
                            </div>
                            <div class="field">
                                <label for="prop-rot-y">Rotation Y</label>
                                <input type="number" step="1" id="prop-rot-y" />
                            </div>
                            <div class="field">
                                <label for="prop-rot-z">Rotation Z</label>
                                <input type="number" step="1" id="prop-rot-z" />
                            </div>
                        </div>
                        <div class="field">
                            <label for="prop-color">Color</label>
                            <input type="color" id="prop-color" />
                        </div>
                    </div>
                </div>
            </div>

            <!-- Layers Section -->
            <div class="panel-section" id="layers-section">
                <div class="panel-header">
                    <span class="panel-title">Layers</span>
                    <button class="panel-toggle" data-section="layers">›</button>
                </div>
                <div class="panel-content">
                    <ul id="layers-list"></ul>
                </div>
            </div>

            <!-- Stage Section (starts collapsed) -->
            <div class="panel-section collapsed" id="stage-section">
                <div class="panel-header">
                    <span class="panel-title">Stage</span>
                    <button class="panel-toggle collapsed" data-section="stage">›</button>
                </div>
                <div class="panel-content collapsed">

                    <!-- Floor -->
                    <div class="stage-group">
                        <div class="stage-group-title">Floor</div>
                        <div class="stage-row">
                            <span class="stage-label">Colour</span>
                            <input type="color" id="floor-color" value="#333333" />
                        </div>
                    </div>

                    <!-- Left Wall -->
                    <div class="stage-group">
                        <div class="stage-group-header">
                            <div class="stage-group-title">Left Wall</div>
                            <label class="toggle-switch" title="Show / hide wall">
                                <input type="checkbox" id="left-wall-visible" checked />
                                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                            </label>
                        </div>
                        <div class="stage-row">
                            <span class="stage-label">Colour</span>
                            <input type="color" id="left-wall-color" value="#3a3a3a" />
                        </div>
                        <div class="doorways-list" id="left-wall-doorways"></div>
                        <button class="add-doorway-btn" id="add-left-doorway">+ Doorway</button>
                    </div>

                    <!-- Right Wall -->
                    <div class="stage-group">
                        <div class="stage-group-header">
                            <div class="stage-group-title">Right Wall</div>
                            <label class="toggle-switch" title="Show / hide wall">
                                <input type="checkbox" id="right-wall-visible" checked />
                                <span class="toggle-track"><span class="toggle-thumb"></span></span>
                            </label>
                        </div>
                        <div class="stage-row">
                            <span class="stage-label">Colour</span>
                            <input type="color" id="right-wall-color" value="#3a3a3a" />
                        </div>
                        <div class="doorways-list" id="right-wall-doorways"></div>
                        <button class="add-doorway-btn" id="add-right-doorway">+ Doorway</button>
                    </div>

                    <!-- Back Wall (always white) -->
                    <div class="stage-group stage-group-muted">
                        <div class="stage-group-title">Back Wall</div>
                        <div class="stage-note">Always white — not configurable</div>
                    </div>

                </div>
            </div>
        </div>


        <!-- three.js via CDN -->
        <script type="importmap">
            {
                "imports": {
                    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
                    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
                }
            }
        </script>


        <!-- App entry point -->
        <script type="module" src="js/main.js"></script>
    </body>
</html>
